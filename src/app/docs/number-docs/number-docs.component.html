<h1>Number control</h1>
<jsonforms
  [(data)]="dataObjects.dataAge"
  [renderers]="renderers"
  [schema]="schemaObjects.schemaAge"
  [uischema]="uiSchemaObjects.uiSchemaAge"></jsonforms>

<div class="flex">
  <div>
    <p>Schema</p>
    <nz-code-editor
      (ngModelChange)="updateSchema('schemaAge', $event)"
      [ngModel]="schemaObjects.schemaAge.properties | editorFormatter"
      [nzEditorOption]="{ language: 'json', automaticLayout: true }"
      class="editor"></nz-code-editor>

    <p>Ui Schema</p>
    <nz-code-editor
      (ngModelChange)="updateUiSchema('uiSchemaAge', $event)"
      [ngModel]="uiSchemaObjects.uiSchemaAge.elements[0] | editorFormatter"
      [nzEditorOption]="{ language: 'json', automaticLayout: true }"
      class="editor"></nz-code-editor>
  </div>

  <div>
    <p>Data</p>
    <nz-code-editor
      (ngModelChange)="updateData('dataAge', $event)"
      [ngModel]="dataObjects.dataAge | editorFormatter"
      [nzEditorOption]="{ language: 'json', automaticLayout: true }"
      class="editor"></nz-code-editor>
  </div>
</div>

<p>Schema</p>
<nz-table [nzTemplateMode]="true">
  <thead>
    <tr>
      <th>Property</th>
      <th>Description</th>
      <th>Type</th>
      <th>Default</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>minimum</td>
      <td>Minimum value</td>
      <td><code>number</code></td>
      <td>-</td>
    </tr>
    <tr>
      <td>maximum</td>
      <td>Maximum value</td>
      <td><code>number</code></td>
      <td>-</td>
    </tr>
    <tr>
      <td>multipleOf</td>
      <td>Stepper</td>
      <td><code>number</code></td>
      <td>-</td>
    </tr>
  </tbody>
</nz-table>
