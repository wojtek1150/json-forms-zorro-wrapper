<h1>Boolean control</h1>

<article>
  <p>Checkbox</p>
  <jsonforms
    [(data)]="dataObjects.dataCheckbox"
    [renderers]="renderers"
    [schema]="schemaObjects.schemaCheckbox"
    [uischema]="uiSchemaObjects.uiSchemaCheckbox"></jsonforms>

  <div class="flex">
    <div>
      <p>Schema</p>
      <nz-code-editor
        (ngModelChange)="updateSchema('schemaCheckbox', $event)"
        [ngModel]="schemaObjects.schemaCheckbox.properties | editorFormatter"
        [nzEditorOption]="{ language: 'json', automaticLayout: true }"
        class="editor"></nz-code-editor>

      <p>Ui Schema</p>
      <nz-code-editor
        (ngModelChange)="updateUiSchema('uiSchemaCheckbox', $event)"
        [ngModel]="uiSchemaObjects.uiSchemaCheckbox.elements[0] | editorFormatter"
        [nzEditorOption]="{ language: 'json', automaticLayout: true }"
        class="editor"></nz-code-editor>
    </div>

    <div>
      <p>Data</p>
      <nz-code-editor
        (ngModelChange)="updateData('dataCheckbox', $event)"
        [ngModel]="dataObjects.dataCheckbox | editorFormatter"
        [nzEditorOption]="{ language: 'json', automaticLayout: true }"
        class="editor"></nz-code-editor>
    </div>
  </div>
</article>

<article>
  <p>Toggle</p>
  <jsonforms
    [(data)]="dataObjects.dataToggle"
    [renderers]="renderers"
    [schema]="schemaObjects.schemaToggle"
    [uischema]="uiSchemaObjects.uiSchemaToggle"></jsonforms>

  <div class="flex">
    <div>
      <p>Schema</p>
      <nz-code-editor
        (ngModelChange)="updateSchema('schemaToggle', $event)"
        [ngModel]="schemaObjects.schemaToggle.properties | editorFormatter"
        [nzEditorOption]="{ language: 'json', automaticLayout: true }"
        class="editor"></nz-code-editor>
    </div>
    <div>
      <p>Ui Schema</p>
      <nz-code-editor
        [ngModel]="uiSchemaObjects.uiSchemaToggle.elements[0] | editorFormatter"
        (ngModelChange)="updateUiSchema('uiSchemaToggle', $event)"
        [nzEditorOption]="{ language: 'json', automaticLayout: true }"
        class="editor"></nz-code-editor>
    </div>
    <div>
      <p>Data</p>
      <nz-code-editor
        [ngModel]="dataObjects.dataToggle | editorFormatter"
        (ngModelChange)="updateData('dataToggle', $event)"
        [nzEditorOption]="{ language: 'json', automaticLayout: true }"
        class="editor"></nz-code-editor>
    </div>
  </div>
</article>

<p>UiSchema options</p>
<nz-table [nzTemplateMode]="true">
  <thead>
    <tr>
      <th>Property</th>
      <th>Description</th>
      <th>Type</th>
      <th>Default</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>toggle</td>
      <td>Enable/disable toggle mode</td>
      <td><code>boolean</code></td>
      <td><code>false</code></td>
    </tr>
  </tbody>
</nz-table>
