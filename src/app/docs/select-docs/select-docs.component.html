<h1>Select control</h1>
<p>A single select can be achieved by using an enum or a oneOf in the JSON schema.</p>

<article>
  <h2>Enum</h2>
  <jsonforms
    [(data)]="dataObjects.dataEnum"
    [renderers]="renderers"
    [schema]="schemaObjects.schemaEnum"
    [uischema]="uiSchemaObjects.uiSchemaEnum"></jsonforms>

  <div class="flex">
    <div>
      <p>Schema</p>
      <nz-code-editor
        [ngModel]="schemaObjects.schemaEnum.properties | editorFormatter"
        [nzEditorOption]="{ language: 'json', automaticLayout: true, readOnly: true }"
        class="editor"></nz-code-editor>
    </div>

    <div>
      <p>Ui Schema</p>
      <nz-code-editor
        [ngModel]="uiSchemaObjects.uiSchemaEnum.elements[0] | editorFormatter"
        [nzEditorOption]="{ language: 'json', automaticLayout: true, readOnly: true }"
        class="editor"></nz-code-editor>
      <p>Data</p>
      <nz-code-editor
        [ngModel]="dataObjects.dataEnum | editorFormatter"
        [nzEditorOption]="{ language: 'json', automaticLayout: true, readOnly: true }"
        class="editor"></nz-code-editor>
    </div>
  </div>
</article>

<article>
  <h2>One of</h2>
  <p>With the use of oneOf, you can also add the title option. You can define an enum in your schema like this:</p>
  <jsonforms
    [(data)]="dataObjects.dataOneOf"
    [renderers]="renderers"
    [schema]="schemaObjects.schemaOneOf"
    [uischema]="uiSchemaObjects.uiSchemaOneOf"></jsonforms>

  <div class="flex">
    <div>
      <p>Schema</p>
      <nz-code-editor
        [ngModel]="schemaObjects.schemaOneOf.properties | editorFormatter"
        [nzEditorOption]="{ language: 'json', automaticLayout: true, readOnly: true }"
        class="editor"></nz-code-editor>
    </div>

    <div>
      <p>Ui Schema</p>
      <nz-code-editor
        [ngModel]="uiSchemaObjects.uiSchemaOneOf.elements[0] | editorFormatter"
        [nzEditorOption]="{ language: 'json', automaticLayout: true, readOnly: true }"
        class="editor"></nz-code-editor>
      <p>Data</p>
      <nz-code-editor
        [ngModel]="dataObjects.dataOneOf | editorFormatter"
        [nzEditorOption]="{ language: 'json', automaticLayout: true, readOnly: true }"
        class="editor"></nz-code-editor>
    </div>
  </div>
</article>
