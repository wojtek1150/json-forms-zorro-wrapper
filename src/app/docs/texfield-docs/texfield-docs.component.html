<h1>Text control</h1>
<nz-code-editor
  [ngModel]="schemaObjects.schemaName.properties | editorFormatter"
  [nzEditorOption]="{ language: 'json', automaticLayout: true, readOnly: true }"
  class="editor"></nz-code-editor>

<p>Ui Schema</p>
<nz-code-editor
  [ngModel]="uiSchemaObjects.uiSchemaName.elements[0] | editorFormatter"
  [nzEditorOption]="{ language: 'json', automaticLayout: true, readOnly: true }"
  class="editor"></nz-code-editor>

<jsonforms
  [data]="{ name: 'John Doe' }"
  [renderers]="renderers"
  [schema]="schemaObjects.schemaName"
  [uischema]="uiSchemaObjects.uiSchemaName"></jsonforms>

<p>As textarea</p>
<nz-code-editor
  [ngModel]="uiSchemaObjects.uiSchemaArea.elements[0] | editorFormatter"
  [nzEditorOption]="{ language: 'json', automaticLayout: true, readOnly: true }"
  class="editor"></nz-code-editor>
<jsonforms [renderers]="renderers" [schema]="schemaObjects.schemaName" [uischema]="uiSchemaObjects.uiSchemaArea"></jsonforms>

<p>UiSchema Options</p>
<nz-table [nzTemplateMode]="true">
  <thead>
    <tr>
      <th>Property</th>
      <th>Description</th>
      <th>Type</th>
      <th>Default</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>multi</td>
      <td>Determines if should be displayed as textarea</td>
      <td><code>boolean</code></td>
      <td>-</td>
    </tr>
    <tr>
      <td>minRows</td>
      <td>Minimum textarea size</td>
      <td><code>number</code></td>
      <td>-</td>
    </tr>
    <tr>
      <td>maxRows</td>
      <td>Maximum textarea size</td>
      <td><code>number</code></td>
      <td>-</td>
    </tr>
  </tbody>
</nz-table>
